<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang Phát Triển — Hệ Thống Đào Tạo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles/base/variables.css" />
  <link rel="stylesheet" href="styles/components/button.css" />
  <!-- Shared header -->
  <script src="src/shared/components/layout/shared-header.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { text-decoration: none; color: inherit; }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Card ── */
    .cs-card {
      background: #fff;
      border-radius: 20px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 12px 40px rgba(15,23,42,0.08);
      padding: 52px 48px 44px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    /* Icon */
    .cs-icon-wrap {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .cs-icon-wrap i { font-size: 36px; color: #3b82f6; }

    /* Badge */
    .cs-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 14px; border-radius: 999px;
      background: #fef3c7; color: #92400e;
      font-size: 11.5px; font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 18px;
    }

    /* Text */
    .cs-page-name {
      font-size: 12px; font-weight: 700; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .cs-title {
      font-size: 24px; font-weight: 800; color: #0f172a;
      line-height: 1.3; margin-bottom: 14px;
    }
    .cs-desc {
      font-size: 14px; color: #6b7280;
      line-height: 1.75; margin-bottom: 32px;
    }

    /* Actions */
    .cs-actions {
      display: flex; gap: 12px;
      justify-content: center; flex-wrap: wrap;
    }

    /* Footer */
    .cs-footer {
      text-align: center; padding: 16px;
      font-size: 12px; color: #9ca3af;
    }

    @media (max-width: 560px) {
      .cs-card { padding: 36px 22px 32px; }
      .cs-title { font-size: 20px; }
    }
  </style>
</head>
<body>

<main>
  <div class="cs-card">

    <div class="cs-icon-wrap" aria-hidden="true">
      <i id="csIcon" class="fas fa-hammer"></i>
    </div>

    <div class="cs-badge">
      <i class="fas fa-circle-notch fa-spin"></i>
      Đang Phát Triển
    </div>

    <p class="cs-page-name" id="csPageName">Trang</p>
    <h1 class="cs-title"    id="csTitle">Tính Năng Đang Được Xây Dựng</h1>
    <p class="cs-desc"      id="csDesc">
      Chúng tôi đang tích cực phát triển tính năng này. Vui lòng quay lại sau.
    </p>

    <div class="cs-actions">
      <a href="index.html" class="btn btn--with-icon btn-primary">
        <i class="fas fa-home"></i> Về Trang Chủ
      </a>
      <button class="btn btn--with-icon btn-ghost" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Quay Lại
      </button>
    </div>

  </div>
</main>

<footer class="cs-footer">
  © 2026 Hệ Thống Quản Lý Giáo Dục. Tất cả các quyền được bảo lưu.
</footer>

<script>
  const PAGE_CONFIG = {
    about: {
      name:  'Giới Thiệu',
      title: 'Trang Giới Thiệu Nhà Trường',
      desc:  'Thông tin chi tiết về lịch sử hình thành, sứ mệnh, tầm nhìn và đội ngũ Ban Giám Hiệu đang được biên soạn. Trang này sẽ sớm ra mắt.',
      icon:  'fas fa-school',
      navId: 'navAbout',
    },
    news: {
      name:  'Tin Tức',
      title: 'Trang Tin Tức & Sự Kiện',
      desc:  'Hệ thống đăng tải tin tức, thông báo và sự kiện của nhà trường đang trong quá trình hoàn thiện. Vui lòng quay lại sau.',
      icon:  'fas fa-newspaper',
      navId: 'navNews',
    },
    contact: {
      name:  'Liên Hệ',
      title: 'Trang Liên Hệ & Hỗ Trợ',
      desc:  'Form liên hệ, thông tin địa chỉ trụ sở và các kênh hỗ trợ của nhà trường đang được xây dựng. Chúng tôi sẽ thông báo khi hoàn thành.',
      icon:  'fas fa-envelope-open-text',
      navId: 'navContact',
    },
    default: {
      name:  'Tính Năng',
      title: 'Tính Năng Đang Được Xây Dựng',
      desc:  'Tính năng này chưa được phát triển. Chúng tôi đang nỗ lực hoàn thiện để mang đến trải nghiệm tốt nhất cho bạn.',
      icon:  'fas fa-hammer',
      navId: null,
    },
  };

  function getPageKey() {
    const p = new URLSearchParams(window.location.search).get('page');
    if (p && PAGE_CONFIG[p]) return p;
    const file = window.location.pathname.split('/').pop().replace('.html', '');
    return PAGE_CONFIG[file] ? file : 'default';
  }

  (function renderPage() {
    const cfg = PAGE_CONFIG[getPageKey()];

    document.getElementById('csIcon').className    = cfg.icon;
    document.getElementById('csPageName').textContent = cfg.name;
    document.getElementById('csTitle').textContent    = cfg.title;
    document.getElementById('csDesc').textContent     = cfg.desc;
    document.title = `${cfg.name} — Đang Phát Triển`;
  })();
</script>
</body>
</html>
